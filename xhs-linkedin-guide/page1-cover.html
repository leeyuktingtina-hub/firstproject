<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1242px;
  height: 1660px;
  overflow: hidden;
}
body {
  background: #FFFFFF;
  font-family: 'Noto Sans SC', 'Inter', 'Helvetica Neue', Arial, sans-serif;
  color: #111111;
  position: relative;
}
.page {
  width: 1242px;
  height: 1660px;
  padding: 100px 110px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}

/* Top meta row */
.top-row {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.page-num {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 500;
  color: #CCCCCC;
  letter-spacing: 3px;
}

/* Main title block */
.title-block {
  margin-top: 120px;
}
.accent-bar {
  width: 56px;
  height: 6px;
  background: #1F3A5F;
  margin-bottom: 72px;
}
.title-line {
  font-size: 100px;
  font-weight: 900;
  line-height: 1.16;
  color: #111111;
  letter-spacing: -2px;
  display: block;
}
.title-line + .title-line {
  margin-top: 4px;
}
.accent { color: #1F3A5F; }

.divider-thin {
  width: 100%;
  height: 1px;
  background: #EAEAEA;
  margin: 64px 0;
}
.subtitle {
  font-size: 46px;
  font-weight: 400;
  color: #666666;
  line-height: 1.55;
  letter-spacing: 0.5px;
}

/* Bottom branding */
.branding {
  font-size: 22px;
  color: #BBBBBB;
  letter-spacing: 1.5px;
  font-weight: 400;
}

/* Decorative dot grid — top right area */
.dot-grid {
  position: absolute;
  right: 110px;
  top: 320px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 16px;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #E0E0E0;
}
</style>
</head>
<body>
<div class="page">

  <!-- Top: page number -->
  <div class="top-row">
    <span class="page-num">01 / 05</span>
  </div>

  <!-- Main content -->
  <div class="title-block">
    <div class="accent-bar"></div>
    <span class="title-line">出海企业做<span class="accent">LinkedIn</span></span>
    <span class="title-line">问题不是<span class="accent">英文差</span></span>
    <div class="divider-thin"></div>
    <div class="subtitle">而是不会把价值讲清楚</div>
  </div>

  <!-- Bottom branding -->
  <div class="branding">出海英文表达优化</div>

  <!-- Decorative dots -->
  <div class="dot-grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

</div>
</body>
</html>
