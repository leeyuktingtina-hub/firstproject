<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample — 漫畫孕期故事</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0e8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
    }

    /* ── 漫畫頁面外框 ── */
    .page {
      background: #fff;
      border: 4px solid #111;
      box-shadow: 8px 8px 0 #111;
      width: 100%;
      max-width: 680px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 0;
    }

    /* ── 單格 ── */
    .panel {
      border: 3px solid #111;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      min-height: 220px;
      position: relative;
      background: #fffdf7;
      overflow: hidden;
    }

    /* 跨兩欄的大格 */
    .panel.wide {
      grid-column: span 2;
      min-height: 180px;
      flex-direction: row;
      gap: 2rem;
      padding: 1.5rem 2rem;
    }

    /* 半網點背景裝飾 */
    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
      background-size: 12px 12px;
      opacity: 0.15;
      pointer-events: none;
    }

    /* ── 對話泡 ── */
    .bubble {
      position: relative;
      background: #fff;
      border: 2.5px solid #111;
      border-radius: 20px;
      padding: 0.45rem 0.9rem;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.45;
      max-width: 180px;
      z-index: 1;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -11px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #111;
    }
    .bubble::before {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border: 5.5px solid transparent;
      border-top-color: #fff;
      z-index: 1;
    }

    /* 思考泡 */
    .bubble.think {
      border-radius: 50%;
      padding: 0.6rem 1rem;
      font-style: italic;
      background: #f5f5ff;
      border-color: #888;
    }
    .bubble.think::after { border-top-color: #888; }
    .bubble.think::before { border-top-color: #f5f5ff; }

    /* 大叫泡 */
    .bubble.shout {
      border-radius: 4px;
      background: #fff8dc;
      transform: rotate(-1.5deg);
      border-width: 3px;
      font-size: 1rem;
      max-width: 220px;
    }

    /* ── 場景標題 ── */
    .caption {
      font-size: 0.75rem;
      color: #777;
      font-style: italic;
      align-self: flex-start;
      background: rgba(0,0,0,0.04);
      padding: 2px 7px;
      border-radius: 3px;
      z-index: 1;
    }

    /* ── 音效字 ── */
    .sfx {
      font-size: 1.6rem;
      font-weight: 900;
      color: #d63031;
      transform: rotate(-5deg) skewX(-8deg);
      display: inline-block;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      letter-spacing: 0.05em;
      z-index: 1;
    }

    svg { z-index: 1; }
  </style>
</head>
<body>

  <h1>SAMPLE — 第一章：意外的兩條線</h1>

  <div class="page">

    <!-- 格1：廁所，早晨 -->
    <div class="panel">
      <div class="caption">某個尋常的早晨…</div>
      <!-- 廁所場景 SVG -->
      <svg width="110" height="130" viewBox="0 0 110 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 窗戶 -->
        <rect x="30" y="8" width="50" height="38" rx="3" fill="#d0eaff" stroke="#111" stroke-width="2.5"/>
        <line x1="55" y1="8" x2="55" y2="46" stroke="#111" stroke-width="2"/>
        <line x1="30" y1="27" x2="80" y2="27" stroke="#111" stroke-width="2"/>
        <!-- 牆 -->
        <rect x="0" y="46" width="110" height="84" fill="#f9f5ef" stroke="#111" stroke-width="0"/>
        <line x1="0" y1="46" x2="110" y2="46" stroke="#111" stroke-width="2.5"/>
        <!-- 地板 -->
        <rect x="0" y="110" width="110" height="20" fill="#e8ddd0" stroke="#111" stroke-width="2"/>
        <!-- 洗手台輪廓 -->
        <ellipse cx="20" cy="95" rx="16" ry="10" fill="#fff" stroke="#111" stroke-width="2"/>
        <rect x="16" y="85" width="8" height="10" fill="#fff" stroke="#111" stroke-width="1.5"/>
        <!-- 主角：女生半身（媽媽） -->
        <!-- 頭 -->
        <circle cx="78" cy="72" r="16" fill="#ffe0c0" stroke="#111" stroke-width="2.5"/>
        <!-- 頭髮 -->
        <path d="M62 66 Q65 52 78 52 Q91 52 94 66" fill="#4a2f1a" stroke="#4a2f1a" stroke-width="1"/>
        <path d="M62 66 Q60 74 62 80" stroke="#4a2f1a" stroke-width="4" stroke-linecap="round"/>
        <path d="M94 66 Q96 74 94 80" stroke="#4a2f1a" stroke-width="4" stroke-linecap="round"/>
        <!-- 眼睛 -->
        <circle cx="73" cy="72" r="2.5" fill="#111"/>
        <circle cx="83" cy="72" r="2.5" fill="#111"/>
        <!-- 嘴巴：正常 -->
        <path d="M74 79 Q78 82 82 79" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 身體 -->
        <path d="M64 88 Q66 105 66 110 L90 110 Q90 105 92 88 Q84 84 78 84 Q72 84 64 88Z" fill="#f9a8d4" stroke="#111" stroke-width="2"/>
        <!-- 手抱胸 -->
        <path d="M64 95 Q72 92 78 93 Q84 92 92 95" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="bubble think">好像哪裡怪怪的…</div>
    </div>

    <!-- 格2：驗孕棒 -->
    <div class="panel">
      <!-- 驗孕棒特寫 SVG -->
      <svg width="100" height="130" viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 手 -->
        <path d="M30 90 Q28 80 32 70 L36 60 Q38 55 42 57 Q44 52 48 54 Q50 49 54 52 Q58 50 59 55 L60 90 Q55 95 45 96 Q35 96 30 90Z" fill="#ffe0c0" stroke="#111" stroke-width="2"/>
        <!-- 手指分線 -->
        <line x1="42" y1="57" x2="41" y2="75" stroke="#111" stroke-width="1.2"/>
        <line x1="48" y1="54" x2="47" y2="75" stroke="#111" stroke-width="1.2"/>
        <line x1="54" y1="52" x2="53" y2="75" stroke="#111" stroke-width="1.2"/>
        <!-- 驗孕棒主體 -->
        <rect x="36" y="95" width="28" height="12" rx="6" fill="#f0f0f0" stroke="#111" stroke-width="2"/>
        <rect x="64" y="98" width="20" height="6" rx="3" fill="#e0e0e0" stroke="#111" stroke-width="1.5"/>
        <!-- 結果窗 -->
        <rect x="39" y="98" width="22" height="6" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
        <!-- 兩條線！ -->
        <line x1="47" y1="99.5" x2="47" y2="102.5" stroke="#e84393" stroke-width="3" stroke-linecap="round"/>
        <line x1="53" y1="99.5" x2="53" y2="102.5" stroke="#e84393" stroke-width="3" stroke-linecap="round"/>
        <!-- 放大標示 -->
        <circle cx="50" cy="101" r="18" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 2"/>
        <text x="50" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#e84393">兩條線！</text>
        <line x1="50" y1="33" x2="50" y2="83" stroke="#e84393" stroke-width="1.5" stroke-dasharray="3 2"/>
      </svg>
      <div class="bubble think">等…等一下…</div>
    </div>

    <!-- 格3（寬格）：驚嚇反應 -->
    <div class="panel wide">
      <!-- 驚嚇媽媽 SVG -->
      <svg width="130" height="140" viewBox="0 0 130 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 放射線（shock lines） -->
        <line x1="65" y1="55" x2="10" y2="10" stroke="#111" stroke-width="2"/>
        <line x1="65" y1="55" x2="120" y2="10" stroke="#111" stroke-width="2"/>
        <line x1="65" y1="55" x2="5" y2="55" stroke="#111" stroke-width="2"/>
        <line x1="65" y1="55" x2="125" y2="55" stroke="#111" stroke-width="2"/>
        <line x1="65" y1="55" x2="15" y2="100" stroke="#111" stroke-width="2"/>
        <line x1="65" y1="55" x2="115" y2="100" stroke="#111" stroke-width="2"/>
        <!-- 頭 -->
        <circle cx="65" cy="52" r="20" fill="#ffe0c0" stroke="#111" stroke-width="2.5"/>
        <!-- 頭髮 -->
        <path d="M45 46 Q48 28 65 28 Q82 28 85 46" fill="#4a2f1a" stroke="#4a2f1a" stroke-width="1"/>
        <path d="M45 46 Q43 56 46 64" stroke="#4a2f1a" stroke-width="5" stroke-linecap="round"/>
        <path d="M85 46 Q87 56 84 64" stroke="#4a2f1a" stroke-width="5" stroke-linecap="round"/>
        <!-- 驚嚇眼睛（大圓眼） -->
        <circle cx="58" cy="50" r="5" fill="#fff" stroke="#111" stroke-width="1.5"/>
        <circle cx="72" cy="50" r="5" fill="#fff" stroke="#111" stroke-width="1.5"/>
        <circle cx="58" cy="51" r="2.5" fill="#111"/>
        <circle cx="72" cy="51" r="2.5" fill="#111"/>
        <!-- 張嘴 -->
        <ellipse cx="65" cy="60" rx="6" ry="5" fill="#c0392b" stroke="#111" stroke-width="1.5"/>
        <!-- 身體 -->
        <path d="M48 72 Q50 100 50 110 L80 110 Q80 100 82 72 Q74 68 65 68 Q56 68 48 72Z" fill="#f9a8d4" stroke="#111" stroke-width="2"/>
        <!-- 雙手舉起 -->
        <path d="M48 78 Q38 68 30 62" stroke="#ffe0c0" stroke-width="8" stroke-linecap="round"/>
        <path d="M82 78 Q92 68 100 62" stroke="#ffe0c0" stroke-width="8" stroke-linecap="round"/>
        <!-- 手掌 -->
        <circle cx="29" cy="61" r="7" fill="#ffe0c0" stroke="#111" stroke-width="2"/>
        <circle cx="101" cy="61" r="7" fill="#ffe0c0" stroke="#111" stroke-width="2"/>
      </svg>

      <div style="display:flex; flex-direction:column; gap:0.8rem; align-items:flex-start;">
        <div class="sfx">WHAT—！</div>
        <div class="bubble shout">兩條線！！！<br/>我懷孕了！？</div>
        <div class="caption">（驗孕棒掉到地上）</div>
        <div class="sfx" style="font-size:1rem; transform:rotate(2deg);">咚！</div>
      </div>
    </div>

  </div>

</body>
</html>
